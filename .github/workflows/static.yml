# Workflow: Sync static frontend to gh-pages branch for GitHub Pages deployment
# This approach works with Pages configured as "Deploy from branch > gh-pages > / (root)"
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "app/static/**"
      - ".github/workflows/static.yml"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy app/static to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/static
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: sync frontend from main ${{ github.sha }}"
